# ==============================
# APPLICATION
# ==============================
spring.application.name=sipspot

# ==============================
# DATABASE (USE CLOUD DB - Railway later)
# ==============================
# Replace these with Railway MySQL details later

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sipspot_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================
# JWT CONFIGURATION
# ==============================
app.jwt.secret=${JWT_SECRET:coffeePlatformSecretKey2024SuperLongStringForSecurity}
app.jwt.expiration=86400000

# ==============================
# EMAIL CONFIGURATION (GMAIL)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# SERVER PORT (REQUIRED FOR RENDER)
# ==============================
server.port=${PORT:10000}